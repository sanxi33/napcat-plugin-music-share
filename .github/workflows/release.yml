name: Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v0.1.0"
          fi
          CLEAN_VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "clean_version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update package version
        run: npm version ${{ steps.version.outputs.clean_version }} --no-git-tag-version --allow-same-version

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release
          cp index.mjs release/
          cp package.json release/
          cd release
          zip -r ../napcat-plugin-music-share.zip index.mjs package.json

      - name: Verify archive
        run: unzip -l napcat-plugin-music-share.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: napcat-plugin-music-share.zip
          generate_release_notes: true
